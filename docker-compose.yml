name: library-system

services:
  postgres:
    image: postgres:15-alpine
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: library_admin
      POSTGRES_PASSWORD: library_password_2024
      POSTGRES_DB: library_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_admin -d library_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: development
    container_name: library_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://library_admin:library_password_2024@postgres:5432/library_system?schema=public
      JWT_SECRET: uskudar-library-jwt-secret-key-2024-demo
      JWT_EXPIRATION: 7d
      PORT: 3001
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      DOCKER_ENV: "true"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - library_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: library_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - library_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: library_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uskudar.edu.tr
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - library_network

volumes:
  postgres_data:
    name: library-system_edit_postgres_data
    external: true

networks:
  library_network:
    driver: bridge
